services:
  tyxt-local-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.10-slim-bookworm}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    image: tyxt-local-agent:1.1.1
    pull_policy: never
    container_name: tyxt-local-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      TESSERACT_PATH: /usr/bin/tesseract
    volumes:
      - ./memory_db:/app/memory_db
      - ./memory_warehouse:/app/memory_warehouse
      - ./profiles:/app/profiles
      - ./Ollama_agent_shared:/app/Ollama_agent_shared
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
